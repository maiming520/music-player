<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>云音·乐</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: radial-gradient(circle at 20% 30%, #0f121c, #03060c);
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            color: #eef4ff;
            min-height: 100vh;
            padding-bottom: 90px;
        }
        .glass {
            background: rgba(20, 25, 40, 0.65);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 28px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px 24px;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 16px;
            margin-bottom: 32px;
        }
        .logo {
            font-size: 1.8rem;
            font-weight: 700;
            background: linear-gradient(135deg, #fff, #8bb4ff);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }
        .search-box {
            flex: 1;
            max-width: 360px;
            display: flex;
            background: rgba(255,255,255,0.08);
            border-radius: 60px;
            padding: 4px 4px 4px 18px;
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255,255,255,0.1);
        }
        .search-box input {
            flex: 1;
            background: transparent;
            border: none;
            color: #eef4ff;
            font-size: 0.9rem;
            outline: none;
            padding: 10px 0;
        }
        .search-box input::placeholder {
            color: #8a99b0;
        }
        .search-box button {
            background: #3b6eff;
            border: none;
            color: white;
            padding: 6px 20px;
            border-radius: 40px;
            cursor: pointer;
            font-weight: 500;
        }
        .section-title {
            font-size: 1.4rem;
            font-weight: 600;
            margin-bottom: 18px;
            display: flex;
            justify-content: space-between;
            align-items: baseline;
        }
        .card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }
        .rec-card {
            background: rgba(20, 25, 40, 0.6);
            backdrop-filter: blur(12px);
            border-radius: 20px;
            padding: 16px 12px;
            text-align: center;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .rec-card:hover {
            transform: translateY(-4px);
            background: rgba(30, 36, 52, 0.8);
        }
        .rec-cover {
            width: 100%;
            aspect-ratio: 1;
            border-radius: 16px;
            background: #2a2f3a;
            background-size: cover;
            background-position: center;
            margin-bottom: 12px;
        }
        .rec-title {
            font-weight: 600;
            font-size: 0.9rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .rec-artist {
            font-size: 0.7rem;
            color: #9aaec5;
        }
        .result-item {
            background: rgba(20, 25, 40, 0.5);
            backdrop-filter: blur(8px);
            border-radius: 20px;
            padding: 12px 16px;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 14px;
            cursor: pointer;
        }
        .result-item:hover {
            background: rgba(59,110,255,0.2);
        }
        .result-cover {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            object-fit: cover;
        }
        .result-info {
            flex: 1;
        }
        .result-name {
            font-weight: 500;
        }
        .result-artist {
            font-size: 0.75rem;
            color: #9aaec5;
        }
        .player-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: rgba(10, 12, 18, 0.9);
            backdrop-filter: blur(20px);
            border-top: 1px solid rgba(255,255,255,0.1);
            padding: 12px 24px;
            z-index: 1000;
        }
        .player-inner {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 16px;
        }
        .player-cover {
            width: 56px;
            height: 56px;
            border-radius: 14px;
            background: #2a2f3a;
            background-size: cover;
            background-position: center;
        }
        .player-info {
            min-width: 160px;
        }
        .player-title {
            font-weight: 600;
        }
        .player-artist {
            font-size: 0.7rem;
            color: #9aaec5;
        }
        .player-controls {
            display: flex;
            align-items: center;
            gap: 20px;
        }
        .ctrl-icon {
            background: transparent;
            border: none;
            color: #eef4ff;
            font-size: 1.4rem;
            cursor: pointer;
            width: 44px;
            height: 44px;
            border-radius: 50%;
        }
        .play-pause {
            background: #3b6eff;
            width: 52px;
            height: 52px;
            font-size: 1.6rem;
        }
        .progress-area {
            flex: 2;
            min-width: 180px;
        }
        .progress-bar {
            width: 100%;
            height: 4px;
            background: rgba(255,255,255,0.2);
            border-radius: 4px;
            cursor: pointer;
        }
        .progress-fill {
            width: 0%;
            height: 100%;
            background: #3b6eff;
            border-radius: 4px;
        }
        .time-wrap {
            display: flex;
            justify-content: space-between;
            font-size: 0.7rem;
            color: #8a99b0;
            margin-top: 4px;
        }
        .volume-wrap {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .volume-slider {
            width: 80px;
        }
        @media (max-width: 700px) {
            .player-inner { flex-wrap: wrap; justify-content: center; }
            .progress-area { width: 100%; order: 1; margin-top: 6px; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div class="logo">🎵 云音 · 乐</div>
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="搜索歌曲、艺术家...">
            <button id="searchBtn">搜索</button>
        </div>
    </div>

    <div class="section-title">
        <span>🔥 热门推荐</span>
        <span style="font-size: 0.75rem; cursor: pointer;" id="refreshRecommend">换一批 ↻</span>
    </div>
    <div class="card-grid" id="recommendGrid"></div>

    <div id="searchResults" style="display: none;">
        <div class="section-title">📄 搜索结果</div>
        <div id="resultsList"></div>
    </div>
</div>

<div class="player-bar">
    <div class="player-inner">
        <div class="player-cover" id="playerCover"></div>
        <div class="player-info">
            <div class="player-title" id="playerTitle">未播放</div>
            <div class="player-artist" id="playerArtist">-</div>
        </div>
        <div class="player-controls">
            <button class="ctrl-icon" id="prevBtn">⏮</button>
            <button class="ctrl-icon play-pause" id="playBtn">▶</button>
            <button class="ctrl-icon" id="nextBtn">⏭</button>
        </div>
        <div class="progress-area">
            <div class="progress-bar" id="progressBar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
            <div class="time-wrap">
                <span id="currentTime">0:00</span>
                <span id="duration">0:00</span>
            </div>
        </div>
        <div class="volume-wrap">
            <span>🔊</span>
            <input type="range" id="volumeSlider" class="volume-slider" min="0" max="1" step="0.01" value="0.7">
        </div>
    </div>
</div>

<audio id="audio"></audio>

<script>
    // ======================== 配置 ========================
    // 请修改为你实际的 API 域名，不要带末尾斜杠
    const API_BASE = 'https://freemusic-git-master-freelancer8.vercel.app';   // 改成你的 API 地址
    const DEFAULT_PLAYLIST_ID = '5185298264';

    // DOM 元素
    const audio = document.getElementById('audio');
    const playBtn = document.getElementById('playBtn');
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');
    const progressBar = document.getElementById('progressBar');
    const progressFill = document.getElementById('progressFill');
    const currentTimeSpan = document.getElementById('currentTime');
    const durationSpan = document.getElementById('duration');
    const volumeSlider = document.getElementById('volumeSlider');
    const playerTitle = document.getElementById('playerTitle');
    const playerArtist = document.getElementById('playerArtist');
    const playerCover = document.getElementById('playerCover');
    const searchInput = document.getElementById('searchInput');
    const searchBtn = document.getElementById('searchBtn');
    const searchResultsDiv = document.getElementById('searchResults');
    const resultsList = document.getElementById('resultsList');
    const recommendGrid = document.getElementById('recommendGrid');
    const refreshRecommendBtn = document.getElementById('refreshRecommend');

    let currentPlaylist = [];
    let currentIndex = 0;
    let isPlaying = false;

    // 工具函数
    function formatTime(sec) {
        if (isNaN(sec)) return '0:00';
        const mins = Math.floor(sec / 60);
        const remain = Math.floor(sec % 60);
        return `${mins}:${remain < 10 ? '0' : ''}${remain}`;
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    // 获取歌曲播放 URL
    async function getSongUrl(songId) {
        try {
            const res = await fetch(`${API_BASE}/song/url?id=${songId}`);
            const data = await res.json();
            if (data.code === 200 && data.data && data.data[0] && data.data[0].url) {
                return data.data[0].url;
            }
        } catch(e) {}
        return `https://music.163.com/song/media/outer/url?id=${songId}.mp3`;
    }

    // 获取歌曲详情
    async function getSongDetail(songId) {
        try {
            const res = await fetch(`${API_BASE}/song/detail?ids=${songId}`);
            const data = await res.json();
            if (data.code === 200 && data.songs && data.songs[0]) {
                const s = data.songs[0];
                return {
                    id: s.id,
                    name: s.name,
                    artist: s.ar.map(a => a.name).join('/'),
                    cover: s.al.picUrl,
                    url: await getSongUrl(s.id)
                };
            }
        } catch(e) {}
        return null;
    }

    // 搜索歌曲
    async function searchSongs(keyword) {
        try {
            const res = await fetch(`${API_BASE}/search?keywords=${encodeURIComponent(keyword)}&type=1&limit=30`);
            const data = await res.json();
            if (data.code === 200 && data.result && data.result.songs) {
                const songs = data.result.songs;
                const detailed = [];
                for (let song of songs.slice(0, 20)) {
                    detailed.push({
                        id: song.id,
                        name: song.name,
                        artist: song.artists.map(a => a.name).join('/'),
                        cover: song.album.picUrl,
                        url: await getSongUrl(song.id)
                    });
                }
                return detailed;
            }
        } catch(e) {
            console.error('搜索失败', e);
        }
        return [];
    }

    // 加载歌单
    async function loadPlaylist(playlistId) {
        try {
            const res = await fetch(`${API_BASE}/playlist/detail?id=${playlistId}`);
            const data = await res.json();
            if (data.code === 200 && data.playlist && data.playlist.tracks) {
                const tracks = data.playlist.tracks.slice(0, 12);
                const songs = [];
                for (let t of tracks) {
                    songs.push({
                        id: t.id,
                        name: t.name,
                        artist: t.ar.map(a => a.name).join('/'),
                        cover: t.al.picUrl,
                        url: await getSongUrl(t.id)
                    });
                }
                return songs;
            }
        } catch(e) {}
        return [];
    }

    // 渲染推荐
    async function renderRecommend() {
        recommendGrid.innerHTML = '<div class="rec-card">加载中...</div>';
        let songs = await loadPlaylist(DEFAULT_PLAYLIST_ID);
        if (!songs.length) {
            // 备用
            songs = [];
            for (let id of [142312, 186016, 133034, 278671]) {
                let detail = await getSongDetail(id);
                if (detail) songs.push(detail);
            }
        }
        if (!songs.length) {
            recommendGrid.innerHTML = '<div class="rec-card">暂无推荐</div>';
            return;
        }
        recommendGrid.innerHTML = '';
        songs.slice(0, 8).forEach(song => {
            const card = document.createElement('div');
            card.className = 'rec-card';
            card.innerHTML = `
                <div class="rec-cover" style="background-image: url('${song.cover || 'https://picsum.photos/160/160'}');"></div>
                <div class="rec-title">${escapeHtml(song.name)}</div>
                <div class="rec-artist">${escapeHtml(song.artist)}</div>
            `;
            card.addEventListener('click', () => {
                currentPlaylist = [song];
                currentIndex = 0;
                playCurrent();
            });
            recommendGrid.appendChild(card);
        });
    }

    async function playCurrent() {
        if (!currentPlaylist.length) return;
        const song = currentPlaylist[currentIndex];
        if (!song.url) {
            song.url = await getSongUrl(song.id);
        }
        audio.src = song.url;
        audio.load();
        playerTitle.innerText = song.name;
        playerArtist.innerText = song.artist;
        if (song.cover) playerCover.style.backgroundImage = `url(${song.cover})`;
        else playerCover.style.backgroundImage = '';
        audio.play().catch(e => console.log('播放失败', e));
    }

    function updatePlayPauseIcon(playing) {
        playBtn.innerHTML = playing ? '⏸' : '▶';
        isPlaying = playing;
    }

    function nextTrack() {
        if (!currentPlaylist.length) return;
        currentIndex = (currentIndex + 1) % currentPlaylist.length;
        playCurrent();
    }

    function prevTrack() {
        if (!currentPlaylist.length) return;
        currentIndex = (currentIndex - 1 + currentPlaylist.length) % currentPlaylist.length;
        playCurrent();
    }

    function updateProgress() {
        if (audio.duration) {
            progressFill.style.width = (audio.currentTime / audio.duration) * 100 + '%';
            currentTimeSpan.innerText = formatTime(audio.currentTime);
            durationSpan.innerText = formatTime(audio.duration);
        }
    }

    async function performSearch() {
        const keyword = searchInput.value.trim();
        if (!keyword) return;
        searchResultsDiv.style.display = 'block';
        resultsList.innerHTML = '<div style="padding:20px; text-align:center;">搜索中...</div>';
        const results = await searchSongs(keyword);
        if (!results.length) {
            resultsList.innerHTML = '<div style="padding:20px; text-align:center;">未找到相关歌曲</div>';
            return;
        }
        resultsList.innerHTML = '';
        results.forEach(song => {
            const item = document.createElement('div');
            item.className = 'result-item';
            item.innerHTML = `
                <img class="result-cover" src="${song.cover || 'https://picsum.photos/48/48'}" onerror="this.src='https://picsum.photos/48/48'">
                <div class="result-info">
                    <div class="result-name">${escapeHtml(song.name)}</div>
                    <div class="result-artist">${escapeHtml(song.artist)}</div>
                </div>
            `;
            item.addEventListener('click', () => {
                currentPlaylist = [song];
                currentIndex = 0;
                playCurrent();
                searchResultsDiv.style.display = 'none';
            });
            resultsList.appendChild(item);
        });
    }

    // 事件绑定
    function bindEvents() {
        playBtn.addEventListener('click', () => {
            if (audio.paused) {
                if (!audio.src && currentPlaylist.length) playCurrent();
                else audio.play();
            } else {
                audio.pause();
            }
        });
        prevBtn.addEventListener('click', prevTrack);
        nextBtn.addEventListener('click', nextTrack);
        audio.addEventListener('play', () => updatePlayPauseIcon(true));
        audio.addEventListener('pause', () => updatePlayPauseIcon(false));
        audio.addEventListener('timeupdate', updateProgress);
        audio.addEventListener('ended', nextTrack);
        progressBar.addEventListener('click', (e) => {
            const rect = progressBar.getBoundingClientRect();
            const percent = (e.clientX - rect.left) / rect.width;
            audio.currentTime = percent * audio.duration;
        });
        volumeSlider.addEventListener('input', (e) => {
            audio.volume = parseFloat(e.target.value);
        });
        searchBtn.addEventListener('click', performSearch);
        searchInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') performSearch();
        });
        refreshRecommendBtn.addEventListener('click', renderRecommend);
    }

    async function init() {
        bindEvents();
        await renderRecommend();
        // 预加载一个默认播放列表（可选）
        let defaultSongs = await loadPlaylist(DEFAULT_PLAYLIST_ID);
        if (defaultSongs.length) {
            currentPlaylist = defaultSongs;
            currentIndex = 0;
            // 不自动播放
        }
        audio.volume = volumeSlider.value;
    }

    init();
</script>
</body>
</html>
